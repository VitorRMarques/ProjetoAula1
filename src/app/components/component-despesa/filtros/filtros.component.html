<div class="mt-4 mb-4">
    <label for="filtroCategoria" class="block text-sm font-medium mb-2">Buscar por Categoria:</label>
    <div class="flex gap-2">
      <input class="border p-2 flex-1"
          id="filtroCategoria"
          type="text"
          [value]="filtroCategoria"
          (input)="atualizarFiltroCategoria($any($event.target).value)"
          placeholder="Digite para filtrar por categoria ou classificação (ex: contas, materiais, agua)"
          list="filtroCategoriasList">
      <datalist id="filtroCategoriasList">
        <option *ngFor="let cat of obterSugestoesCategoria()" [value]="cat"></option>
        <option value="contas"></option>
        <option value="materiais"></option>
        <option value="pagamentos"></option>
      </datalist>
      <button class="border-2 bg-gray-500 text-white px-4 py-2" (click)="onLimparFiltro()" type="button">Limpar</button>
    </div>
    <label for="filtroData" class="block text-sm font-medium mb-2 mt-4">Buscar por Data:</label>
    <div class="flex gap-2">
      <input class="border p-2 flex-1"
          id="filtroData"
          type="date"
          [value]="filtroData"
          (input)="atualizarFiltroData($any($event.target).value)"
          placeholder="Selecione uma data para filtrar">
      <button class="border-2 bg-gray-500 text-white px-4 py-2" (click)="onLimparFiltro()" type="button">Limpar</button>
    </div>
    <p class="text-sm text-gray-600 mt-1">
      Mostrando {{ despesasFiltradas.length }} de {{ despesas.length }} despesas
      <span *ngIf="filtroCategoria || filtroData"> (filtrado por:
        <span *ngIf="filtroCategoria">"{{ filtroCategoria }}"</span>
        <span *ngIf="filtroCategoria && filtroData"> e </span>
        <span *ngIf="filtroData">{{ filtroData | date:'dd/MM/yyyy' }}</span>
      )</span>
    </p>
</div>
